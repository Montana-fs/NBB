name: Byg Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['CRM/**']

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer pakker
        working-directory: CRM
        run: pip install -r requirements.txt pyinstaller

      - name: Byg EXE
        working-directory: CRM
        run: pyinstaller NBB-CRM.spec --noconfirm

      - name: Pak til ZIP
        shell: pwsh
        run: Compress-Archive -Path "CRM/dist/NBB-CRM/*" -DestinationPath "NBB-CRM-Windows.zip"

      - name: Gem som artifact
        uses: actions/upload-artifact@v4
        with:
          name: NBB-CRM-Windows
          path: NBB-CRM-Windows.zip
          retention-days: 90
